    #root{width:100%;height:100%;overflow-x:hidden;overflow-y:auto;font-family:inherit;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch;}
    #global-settings-portal{position:fixed;top:0;right:0;z-index:9999;font-size:13px;font-family:'Yu Mincho','Georgia',serif;}
    input[type=range]{-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;outline:none;border:none;cursor:pointer;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#e8728a;cursor:pointer;box-shadow:0 0 4px rgba(232,114,138,0.5);}
    input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#e8728a;cursor:pointer;border:none;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:#0a0618;}
    ::-webkit-scrollbar-thumb{background:#3a1a3a;border-radius:2px;}
    a{color:#f090b0;}
  /* ゲーム入力欄（紫文字の視認性） */
    #root .game-inp-action{color:#e8e0d4;}
    #root .game-inp-action::placeholder{color:#8a8070;opacity:1;}
    #root .game-inp-gm{color:#d8d4e8;background:#14121c;border-radius:4px;}
    #root .game-inp-gm::placeholder{color:#a8a4b8;opacity:1;}
    #root .game-gm-row{border-color:#3a3548 !important;background:#100e18 !important;}
    /* GM思考中インジケータ */
    @keyframes gm-pulse{0%,100%{opacity:.35;transform:scale(.92)}50%{opacity:1;transform:scale(1)}}
    @keyframes gm-spin{to{transform:rotate(360deg)}}
    .gm-thinking-bar{
      display:flex;align-items:center;gap:10px;padding:8px 12px;
      background:linear-gradient(90deg,rgba(232,114,138,.12),rgba(112,80,224,.08));
      border-bottom:1px solid rgba(232,114,138,.35);
      font-size:0.8rem;color:#e8d0e0;flex-shrink:0;
    }
    .gm-thinking-bar.slow{color:#f0d080;border-bottom-color:rgba(240,208,128,.4);}
    .gm-thinking-bar.timeout{color:#f0a0a0;background:rgba(224,80,80,.12);border-bottom-color:rgba(224,80,80,.5);}
    .gm-thinking-spinner{
      width:16px;height:16px;border:2px solid rgba(232,114,138,.25);
      border-top-color:#e8728a;border-radius:50%;animation:gm-spin .85s linear infinite;flex-shrink:0;
    }
    .gm-thinking-dots span{display:inline-block;animation:gm-pulse 1.1s ease-in-out infinite;}
    .gm-thinking-dots span:nth-child(2){animation-delay:.2s}
    .gm-thinking-dots span:nth-child(3){animation-delay:.4s}
  </style>

const GM_FETCH_MS=45000;

async function fetchWithTimeout(url,options,ms=GM_FETCH_MS){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  try{
    return await fetch(url,{...options,signal:ctrl.signal});
  }catch(e){
    if(e.name==="AbortError") throw new Error("タイムアウト（"+Math.round(ms/1000)+"秒）");
    throw e;
  }finally{clearTimeout(tid);}
}

// GM思考中バー（経過秒・遅延・タイムアウト表示）
function GmThinkingBar({loading,model,loadSec,loadHint}){
  if(!loading) return null;
  const slow=loadHint==="slow";
  const timeout=loadHint==="timeout";
  const msg=timeout
    ?"応答がありません。通信を確認するか、しばらく待って再試行してください"
    :slow
    ?"まだ考えています…（混雑時は1分ほどかかることがあります）"
    :"GMが思考中";
  return(
    <div className={"gm-thinking-bar"+(timeout?" timeout":slow?" slow":"")}>
      <div className="gm-thinking-spinner"/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:timeout||slow?"bold":"normal"}}>{msg}</div>
        <div style={{fontSize:"0.7rem",color:timeout?"#e8a0a0":slow?"#d8c890":"#a8a0b8",marginTop:"2px"}}>
          {model?`接続先: ${model}`:"接続準備中"}
          {loadSec>0&&<span> · {loadSec}秒経過</span>}
          {!timeout&&loadSec>=GM_FETCH_MS/1000-5&&<span> · まもなくタイムアウト</span>}
        </div>
      </div>
      <span className="gm-thinking-dots" aria-hidden="true"><span>✦</span><span>✦</span><span>✦</span></span>
    </div>
  );
}

// ── 経過日数フォーマット ──────────────────────────────
function formatDay(day){
  if(!day||day<1)return "1日目";
  if(day<31)return `${day}日目`;
  const months=Math.floor((day-1)/30);
  const remDays=(day-1)%30+1;
  if(months<12){
    return remDays===1?`${months}か月目`:`${months}か月${remDays}日目`;
  }
  const years=Math.floor(months/12);
  const remMonths=months%12;
  if(remMonths===0)return remDays===1?`${years}年目`:`${years}年${remDays}日目`;
  return remDays===1?`${years}年${remMonths}か月目`:`${years}年${remMonths}か月${remDays}日目`;
}

  root.style.zoom="";
}

  const root=document.getElementById("root");
  if(root)root.style.fontFamily=fval;

}

function loadAutosave(){
  try{
    const raw=localStorage.getItem("trpg_autosave");
    if(!raw) return null;
    const data=JSON.parse(raw);
    if(!data||!data.player) return null;
    return data;
  }catch(e){
    console.warn("自動セーブ読込失敗:",e);
    return null;
  }
}

// ── APIKEY ───────────────────────────────────────
function ApiKey({apiKey,setApiKey,onNext,onSkip,onBack}){
  const [show,setShow]=useState(false);
  const [testState,setTestState]=useState("idle"); // idle|testing|ok|fail
  const [testMsg,setTestMsg]=useState("");

  const testKey=async()=>{
    if(!apiKey.trim())return;
    setTestState("testing");setTestMsg("");
    try{
      // モデル呼び出しではなく認証確認エンドポイントを使用
      const res=await fetch("https://openrouter.ai/api/v1/auth/key",{
        method:"GET",
        headers:{"Authorization":`Bearer ${apiKey}`}
      });
      if(res.status===401||res.status===403){
        setTestState("fail");
        setTestMsg("APIキーが無効です。キーを確認してください");
        return;
      }
      const data=await res.json();
      if(data.error){
        setTestState("fail");
        setTestMsg("APIキーが無効です");
      }else{
        setTestState("ok");
        const rem=data.data?.limit_remaining;
        setTestMsg(rem!=null
          ? `接続成功！残クレジット：$${Math.round(rem*100)/100}`
          : "接続成功！APIキーは有効です");
      }
    }catch(e){
      setTestState("fail");
      setTestMsg(`通信エラー：${e.message.slice(0,30)}`);
    }
  };

  const testColor={idle:"#5a4a6a",testing:"#c8a000",ok:"#60c060",fail:"#e05050"}[testState];
  const testLabel={idle:"🔌 接続テスト",testing:"通信中…",ok:"✅ 接続成功",fail:"❌ 接続失敗"}[testState];

  return(
    <Wrap step="STEP 1 / 3" title="APIキー設定">
      <div style={{maxWidth:"460px",margin:"0 auto"}}>
        <BBox pink style={{marginBottom:"16px"}}><b>📋 OpenRouterのAPIキー（任意）</b><br/>1. <a href="https://openrouter.ai" target="_blank" style={{color:"#f090b0"}}>openrouter.ai</a> でアカウント作成<br/>2.「Keys」→「Create Key」でキーを発行<br/>3. 下の欄に貼り付ける<br/><span style={{fontSize:"0.7rem",color:"#6a4a6a"}}>※ キーはブラウザにのみ保存。未設定時はデモモードで動作</span></BBox>
        <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
          <input type={show?"text":"password"} value={apiKey} onChange={e=>{setApiKey(e.target.value);setTestState("idle");setTestMsg("");}} placeholder="sk-or-v1-...（空欄可）" style={{flex:1,...INP}}/>
          <GB ghost onClick={()=>setShow(!show)} style={{padding:"9px 12px",fontSize:"0.75rem"}}>{show?"隠す":"表示"}</GB>
        </div>
        {/* 接続テストボタン */}
        <div style={{marginBottom:"12px"}}>
          <button onClick={testKey} disabled={!apiKey.trim()||testState==="testing"}
            style={{width:"100%",padding:"9px",background:"rgba(90,70,100,0.2)",color:testColor,border:`1px solid ${testColor}`,borderRadius:"6px",cursor:(!apiKey.trim()||testState==="testing")?"not-allowed":"pointer",fontFamily:"inherit",fontSize:"0.8rem",transition:"all 0.2s"}}>
            {testLabel}
          </button>
          {testMsg&&(
            <div style={{marginTop:"6px",padding:"8px 12px",background:testState==="ok"?"rgba(60,180,60,0.1)":"rgba(200,50,50,0.1)",border:`1px solid ${testColor}40`,borderRadius:"6px",fontSize:"0.75rem",color:testColor}}>
              {testMsg}
            </div>
          )}
        </div>
        <BBox blue style={{marginBottom:"16px"}}>💡 フォールバック：Claude Sonnet → Gemini Flash → Llama 70b<br/>制限時に自動切り替え</BBox>
        <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
          <GB ghost onClick={onBack} style={{flex:"0 0 90px"}}>← 戻る</GB>
          <GB onClick={onNext} full>次へ → キャラクター作成</GB>
        </div>
        <GB ghost onClick={onSkip} full style={{fontSize:"0.75rem",color:"#8a7a8a"}}>APIキーなしで続ける（デモモード）</GB>
      </div>
    </Wrap>
  );
}

// ── CHARA FLOW ───────────────────────────────────
const GENDERS=[
  {id:"female",name:"女",  icon:"♀"},
  {id:"male",  name:"男",  icon:"♂"},
  {id:"other", name:"どちらでもない",icon:"⚧"},
  {id:"secret",name:"秘密",icon:"？"},
];

function CharaFlow({onDone,apiKey,onBack,initialStep=0,initialForm=null,onStepChange}){
  // ── state（全てトップレベルで宣言）────────────────
  const [hist,setHist]=useState([]);
  const [mode,setMode]=useState("");
  const [selPreset,setSelPreset]=useState(null);
  const [diff,setDiff]=useState("normal");
  const [origin,setOrigin]=useState("");
  const [race,setRace]=useState("");
  const [raceNote,setRaceNote]=useState("");
  const [gender,setGender]=useState("");
  const [job,setJob]=useState("");
  const [jobNote,setJobNote]=useState("");
  const [frag,setFrag]=useState("");
  const [traits,setTraits]=useState([]);
  const [customTrait,setCustomTrait]=useState("");
  const [stats,setStats]=useState({...BASE});
  const [pt,setPt]=useState(PT);
  const [freeDesc,setFreeDesc]=useState("");
  const [aiResult,setAiResult]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiError,setAiError]=useState("");
  const [adjPt,setAdjPt]=useState(6);
  const [adjStats,setAdjStats]=useState(null);
  const [finalName,setFinalName]=useState("");
  const [startLoc,setStartLoc]=useState("");
  // 各ステップの完了フラグ（選択後に「次へ」を押すまで遷移しない）
  const [step,setStep]=useState(initialStep||0);
  // initialFormがあれば復元
  useState(()=>{
    if(initialForm&&(initialStep||0)>0){
      setOrigin(initialForm.origin||"");
      setRace(initialForm.race||"");setRaceNote(initialForm.raceNote||"");
      setGender(initialForm.gender||"");setJob(initialForm.job||"");
      setJobNote(initialForm.jobNote||"");setFrag(initialForm.frag||"");
      if(initialForm.traits)setTraits(initialForm.traits);
      if(initialForm.customTrait)setCustomTrait(initialForm.customTrait);
      if(initialForm.stats)setStats(initialForm.stats);
      if(initialForm.startLoc)setStartLoc(initialForm.startLoc);
      if(initialForm.difficulty)setDiff(initialForm.difficulty);
    }
  });
  // 0=モード選択 1=出身 2=種族 3=性別 4=職業 5=特技 6=STAT 7=確認
  // プリセット用
  const [showStat,setShowStat]=useState(false);
  const [showConfirm,setShowConfirm]=useState(false);

  const isR=origin==="resident";
  const isO=origin==="outsider";
  const isAm=job==="amnesiac";
  const jList=isR?RES_JOBS:OUT_JOBS;
  const selJob=jList.find(j=>j.id===job);
  const selRace=RACES.find(r=>r.id===race);

  // ── スナップショット ──────────────────────────────
  const snap=()=>({mode,selPreset,origin,race,raceNote,gender,job,jobNote,frag,
    traits:[...traits],customTrait,stats:{...stats},pt,freeDesc,aiResult,adjStats,
    adjPt,finalName,startLoc,step,showStat,showConfirm});

  // ── 次のステップへ ────────────────────────────────
  const goNext=()=>{setHist(h=>[...h,snap()]);setStep(s=>s+1);};
  const goStep=(n)=>{setHist(h=>[...h,snap()]);setStep(n);};

  // ── 1つ戻る ──────────────────────────────────────
  const goOneBack=()=>{
    if(hist.length===0){onBack();return;}
    const prev=hist[hist.length-1];
    setHist(h=>h.slice(0,-1));
    setMode(prev.mode);setSelPreset(prev.selPreset);
    setOrigin(prev.origin);setRace(prev.race);setRaceNote(prev.raceNote||"");
    setGender(prev.gender);setJob(prev.job);setJobNote(prev.jobNote||"");
    setFrag(prev.frag);setTraits(prev.traits);setCustomTrait(prev.customTrait||"");
    setStats(prev.stats);setPt(prev.pt);setFreeDesc(prev.freeDesc||"");
    setAiResult(prev.aiResult);setAdjStats(prev.adjStats);setAdjPt(prev.adjPt||6);
    setFinalName(prev.finalName||"");setStartLoc(prev.startLoc||"");
    setStep(prev.step||0);setShowStat(prev.showStat||false);setShowConfirm(prev.showConfirm||false);
  };

  // ── 最初に戻る ────────────────────────────────────
  const goTop=()=>{
    setHist([]);setMode("");setSelPreset(null);setOrigin("");setRace("");setRaceNote("");
    setGender("");setJob("");setJobNote("");setFrag("");setTraits([]);
    setStats({...BASE});setPt(PT);setAiResult(null);setAdjStats(null);setAdjPt(6);
    setStartLoc("");setStep(0);setShowStat(false);setShowConfirm(false);
    // 自由記述は保持
  };

  // ── NavBtns ───────────────────────────────────────
  const NavBtns=({onBack:cb})=>(
    <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
      <button onClick={cb||goOneBack} style={{padding:"6px 14px",background:"transparent",color:"#c8a0b8",border:"1px solid #4a2a4a",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem"}}>← 一つ戻る</button>
      <button onClick={goTop} style={{padding:"6px 14px",background:"transparent",color:"#7a6a8a",border:"1px solid #3a2a3a",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem"}}>↩ 最初に戻る</button>
    </div>
  );

  // ── ユーティリティ ────────────────────────────────
  const rand=()=>{const b={...BASE};let r=PT;while(r>0){const k=SK[Math.floor(Math.random()*7)];if(b[k]<20){b[k]++;r--;}}setStats(b);setPt(0);};
  const chSt=(k,d)=>{const nv=stats[k]+d,np=pt-d;if(nv<1||nv>20||np<0||np>PT)return;setStats(p=>({...p,[k]:nv}));setPt(np);};
  const togTrait=id=>{
    if(id==="none"){setTraits(p=>p.includes("none")?[]:["none"]);return;}
    setTraits(p=>{if(p.includes("none"))return p;return p.includes(id)?p.filter(x=>x!==id):p.length<2?[...p,id]:p;});
  };
  const effStats=()=>{
    let s={...stats};
    try{
      if(selRace&&selRace.id!=="other")s=applyBonus(s,selRace.bonus||{},selRace.pen||{});
      if(selJob)s=applyBonus(s,selJob.sb||{});
      if(isAm){const fr=FRAGS.find(x=>x.id===frag);if(fr)s=applyBonus(s,fr.bonus||{});}
    }catch(e){console.warn("effStats error",e);}
    return s;
  };

  const evalWithAI=async()=>{
    if(!freeDesc.trim())return;
    setAiLoading(true);setAiError("");setAiResult(null);
    const SYS=`あなたはTRPGキャラクター評価AIです。JSONのみで返答。{"stats":{"VIT":数値,"STR":数値,"DEX":数値,"INT":数値,"REI":数値,"CHA":数値,"LUK":数値},"traits":[{"id":"t1","name":"特技名","desc":"効果"},{"id":"t2","name":"特技名","desc":"効果"}],"skills":["スキル名1","スキル名2"],"reason":"根拠50字以内","jobTrait":"職業特性名","jobTraitDesc":"説明"} 必須：stats合計=77。`;
    try{
      const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},body:JSON.stringify({model:"anthropic/claude-sonnet-4-5",max_tokens:600,messages:[{role:"system",content:SYS},{role:"user",content:`東方ProjectのTRPGとして評価：\n${freeDesc}`}]})});
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      const text=(data.choices?.[0]?.message?.content||"").trim();
      const parsed=JSON.parse(text.replace(/^```(?:json)?/i,"").replace(/```$/,"").trim());
      const s=parsed.stats||{};const total=Object.values(s).reduce((a,b)=>a+(Number(b)||0),0);
      if(total!==77&&total>0)s["VIT"]+=(77-total);
      parsed.traits=parsed.traits||[];parsed.skills=parsed.skills||[];
      parsed.reason=parsed.reason||"バランス型";
      parsed.jobTrait=parsed.jobTrait||"経験者";parsed.jobTraitDesc=parsed.jobTraitDesc||"様々な経験を積んできた";
      setAiResult(parsed);setAdjStats({...parsed.stats});setAdjPt(6);
    }catch(e){setAiError(`評価に失敗しました：${e.message}`);}
    setAiLoading(false);
  };

  const doRandJudge=()=>{
    const s={VIT:5,STR:5,DEX:5,INT:5,REI:5,MAG:5,CHA:5,LUK:5,LAT:5};let rem=16;
    while(rem>0){const k=SK[Math.floor(Math.random()*SK.length)];if(s[k]<18){s[k]++;rem--;}}
    const shuffled=[...TRAITS_POOL.filter(t=>t.id!=="none")].sort(()=>Math.random()-0.5);
    const mystSkills=["???・一人前","謎の力・見習い","忘れた何か・熟練","封じられた記憶・見習い"];
    setAiResult({stats:s,traits:[shuffled[0],shuffled[1]],skills:[mystSkills[Math.floor(Math.random()*mystSkills.length)]],reason:"…何かがある。",jobTrait:"謎の存在",jobTraitDesc:"正体は物語の中で明らかになる"});
    setAdjStats({...s});setAdjPt(6);
  };

  const chAdj=(k,d)=>{if(!adjStats)return;const nv=adjStats[k]+d,np=adjPt-d;if(nv<1||nv>20||np<0||np>6)return;setAdjStats(p=>({...p,[k]:nv}));setAdjPt(np);};

  // ════════════════════════════════════════════════════
  //  画面レンダリング（step番号で管理）
  // ════════════════════════════════════════════════════

  // ── step0：モード選択 ──────────────────────────────
  if(step===0) return(
    <Wrap step="STEP 2 / 3" title="キャラクター選択">
      <div style={{maxWidth:"480px",margin:"0 auto"}}>
        <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
          <button onClick={goOneBack} style={{padding:"6px 14px",background:"transparent",color:"#c8a0b8",border:"1px solid #4a2a4a",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem"}}>← 一つ戻る</button>
          <button onClick={onBack} style={{padding:"6px 14px",background:"transparent",color:"#7a6a8a",border:"1px solid #3a2a3a",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem"}}>↩ タイトルに戻る</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"}}>
          <GCard sel={false} onClick={()=>{setHist(h=>[...h,snap()]);setMode("preset");setStep(10);}}>
            <div style={{fontSize:"28px",marginBottom:"8px"}}>🌸</div>
            <div style={{fontSize:"0.9rem",fontWeight:"bold",color:"#e8728a",marginBottom:"4px"}}>固有キャラクター</div>
            <div style={{fontSize:"0.65rem",color:"#8a7a8a",lineHeight:"1.7"}}>霊夢・魔理沙・咲夜・妖夢</div>
          </GCard>
          <GCard sel={false} onClick={()=>{setHist(h=>[...h,snap()]);setMode("original");setStep(1);}}>
            <div style={{fontSize:"28px",marginBottom:"8px"}}>✏</div>
            <div style={{fontSize:"0.9rem",fontWeight:"bold",color:"#e8728a",marginBottom:"4px"}}>オリジナル</div>
            <div style={{fontSize:"0.65rem",color:"#8a7a8a",lineHeight:"1.7"}}>自分だけのキャラを作成</div>
          </GCard>
        </div>
        <GCard sel={false} onClick={()=>{setHist(h=>[...h,snap()]);setMode("unknown");setStep(20);}}>
          <div style={{display:"flex",alignItems:"center",gap:"14px",width:"100%"}}>
            <div style={{fontSize:"28px"}}>❓</div>
            <div><div style={{fontSize:"0.9rem",fontWeight:"bold",color:"#e8728a",marginBottom:"3px"}}>あなたはだあれ？</div>
            <div style={{fontSize:"0.65rem",color:"#8a7a8a",lineHeight:"1.7"}}>自由に描写するだけ。正体は物語の中で。</div></div>
          </div>
        </GCard>
      </div>
    </Wrap>
  );

  // ── step10〜：固有キャラ ──────────────────────────
  if(step===10){
    return(
      <Wrap step="固有キャラクター" title="キャラクター選択">
        <div style={{maxWidth:"560px",margin:"0 auto"}}>
          <NavBtns/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
            {PRESET_CHARS.map(pc=>(
              <GCard key={pc.id} sel={false} onClick={()=>{setHist(h=>[...h,snap()]);setSelPreset(pc.id);setStep(11);}} row>
                <span style={{fontSize:"26px",marginRight:"10px"}}>{pc.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"0.85rem",fontWeight:"bold",color:pc.color}}>{pc.name}</div>
                  <div style={{fontSize:"0.6rem",color:"#6a5a6a",marginTop:"3px",lineHeight:"1.5"}}>{pc.desc.slice(0,30)}…</div>
                </div>
              </GCard>
            ))}
          </div>
        </div>
      </Wrap>
    );
  }

  if(step===11){
    const pc=PRESET_CHARS.find(p=>p.id===selPreset);
    if(!pc)return null;
    return(
      <Wrap step="固有キャラクター" title={pc.name}>
        <div style={{maxWidth:"480px",margin:"0 auto"}}>
          <NavBtns/>
          <div style={{textAlign:"center",padding:"20px",background:"rgba(232,114,138,0.08)",border:`1px solid ${pc.color}`,borderRadius:"12px",marginBottom:"16px"}}>
            <div style={{fontSize:"44px",marginBottom:"6px"}}>{pc.icon}</div>
            <div style={{fontSize:"0.75rem",color:"#8a7a8a",lineHeight:"1.8"}}>{pc.desc}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"4px",marginBottom:"14px"}}>
            {SK.map(k=><div key={k} style={{textAlign:"center",padding:"6px 2px",background:"#0f0c18",borderRadius:"4px"}}><div style={{fontSize:"9px",color:"#6a5a6a"}}>{STAT_INFO[k].label}</div><div style={{fontSize:"0.9rem",color:"#f0d080",fontWeight:"bold"}}>{pc.stats[k]}</div></div>)}
          </div>
          {pc.traits.map((t,i)=><div key={i} style={{padding:"5px 9px",marginBottom:"4px",background:"#0f0c18",borderRadius:"4px",fontSize:"0.7rem",color:"#d4c8e4",borderLeft:"2px solid #7030a0"}}>✦ {t.name}：{t.desc}</div>)}
          <FL label="難易度（開始後変更不可）" style={{marginTop:"14px"}}>
            <div style={{display:"flex",gap:"8px",marginTop:"6px"}}>
              {DIFFICULTY.map(d=>{const sel=diff===d.id;return <button key={d.id} onClick={()=>setDiff(d.id)} style={{flex:1,padding:"10px 4px",background:sel?"rgba(232,114,138,0.15)":"#0f0c18",color:sel?d.color:"#555",border:sel?"1px solid "+d.color:"1px solid #2a1a2a",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit"}}><div style={{fontSize:"18px",fontWeight:"bold"}}>{d.name}</div><div style={{fontSize:"0.6rem",marginTop:"2px"}}>{d.sub}</div></button>;})}
            </div>
          </FL>
          <GB onClick={()=>onDone({isPreset:true,presetData:pc,difficulty:diff})} full primary style={{marginTop:"20px"}}>この子で始める 🌸</GB>
        </div>
      </Wrap>
    );
  }

  // ── step20〜：あなたはだあれ？ ──────────────────────
  if(step===20) return(
    <Wrap step="あなたはだあれ？" title="あなたはだあれ？">
      <div style={{maxWidth:"540px",margin:"0 auto"}}>
        <NavBtns/>
        <BBox pink style={{marginBottom:"14px"}}>❓ 自由に描写してください。運命がSTATを決めます。</BBox>
        <FL label="あなたはどんな存在ですか？">
          <textarea value={freeDesc} onChange={e=>setFreeDesc(e.target.value)}
            placeholder={"例：気づいたら幻想郷にいた。名前も過去も分からないが、なぜか刀の使い方だけ知っている。\n例：半分人間・半分何か。自分でも自分が何か分からない。"}
            rows={5} style={{width:"100%",...INP,boxSizing:"border-box",resize:"vertical",lineHeight:"1.8"}}/>
        </FL>
        <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
          <GB onClick={doRandJudge} disabled={!freeDesc.trim()} primary style={{flex:1}}>❓ 運命に委ねる</GB>
          {apiKey&&<GB ghost onClick={evalWithAI} disabled={!freeDesc.trim()||aiLoading} style={{flex:"0 0 110px"}}>{aiLoading?"判断中...":"🤖 AIに聞く"}</GB>}
        </div>
        {aiError&&<div style={{color:"#e05050",fontSize:"0.7rem",marginBottom:"12px"}}>{aiError}</div>}
        {aiResult&&adjStats&&<>
          <div style={{padding:"14px",background:"rgba(232,114,138,0.06)",border:"1px solid rgba(232,114,138,0.3)",borderRadius:"8px",marginBottom:"14px"}}>
            <div style={{fontSize:"0.65rem",color:"#e8728a",marginBottom:"10px"}}>◆ 判断結果</div>
            <div style={{padding:"6px 10px",background:"#0f0c18",borderRadius:"4px",marginBottom:"10px",fontSize:"0.7rem",color:"#d4c8e4",borderLeft:"2px solid #e8728a"}}>💬 {aiResult.reason}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"4px",marginBottom:"10px"}}>
              {SK.map(k=>{const av=adjStats[k]||5;const rv=aiResult.stats?.[k]||5;const dv=av-rv;return(<div key={k} style={{textAlign:"center",padding:"5px 2px",background:"#0f0c18",borderRadius:"4px"}}>
                <div style={{fontSize:"9px",color:"#6a5a6a"}}>{STAT_INFO[k].label}</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"2px"}}>
                  <SB onClick={()=>chAdj(k,-1)} style={{width:"16px",height:"16px",fontSize:"0.65rem"}}>－</SB>
                  <span style={{fontSize:"0.85rem",color:"#f0d080",fontWeight:"bold",width:"20px",textAlign:"center"}}>{adjStats[k]||5}</span>
                  <SB onClick={()=>chAdj(k,+1)} style={{width:"16px",height:"16px",fontSize:"0.65rem"}}>＋</SB>
                </div>
                {dv!==0&&<div style={{fontSize:"9px",color:dv>0?"#80e080":"#e08080"}}>{dv>0?"+":""}{dv}</div>}
              </div>);})}
            </div>
            <div style={{textAlign:"right",fontSize:"0.65rem",color:adjPt>0?"#f0d080":"#555",marginBottom:"8px"}}>微調整残り {adjPt} pt</div>
            {aiResult.traits.map((t,i)=><div key={i} style={{padding:"4px 8px",marginBottom:"3px",background:"#0f0c18",borderRadius:"4px",fontSize:"0.65rem",color:"#d4c8e4",borderLeft:"2px solid #7030a0"}}>✦ {t.name}：{t.desc}</div>)}
          </div>
          <FL label="難易度">
            <div style={{display:"flex",gap:"8px",marginTop:"4px"}}>
              {DIFFICULTY.map(d=>{const sel=diff===d.id;return <button key={d.id} onClick={()=>setDiff(d.id)} style={{flex:1,padding:"8px 4px",background:sel?"rgba(232,114,138,0.15)":"#0f0c18",color:sel?d.color:"#555",border:sel?"1px solid "+d.color:"1px solid #2a1a2a",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit"}}><div style={{fontSize:"16px",fontWeight:"bold"}}>{d.name}</div><div style={{fontSize:"0.6rem",marginTop:"2px"}}>{d.sub}</div></button>;})}
            </div>
          </FL>
          <GB onClick={()=>onDone({isPreset:false,name:finalName||"？",origin:"unknown",race:"不明",job:"不明",frag:"",traits:[],stats:adjStats,difficulty:diff,aiOverride:{traits:aiResult.traits,skills:aiResult.skills,jobTrait:aiResult.jobTrait,jobTraitDesc:aiResult.jobTraitDesc,freeDesc,isUnknown:true}})} disabled={!freeDesc.trim()} full primary style={{marginTop:"8px"}}>この存在で始める ❓</GB>
        </>}
      </div>
    </Wrap>
  );

  // ── step1：出身 ────────────────────────────────────
  if(step===1) return(
    <Wrap step="① 出身" title="どこから来ましたか？">
      <div style={{maxWidth:"480px",margin:"0 auto"}}>
        <NavBtns/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px"}}>
          {[{id:"resident",icon:"🌸",name:"幻想郷の住人",desc:"幻想郷の常識・地理・スペルカードを知っている"},{id:"outsider",icon:"🚂",name:"外の世界からの外来人",desc:"現代の知識・アイテムを持つ。幻想郷の常識は知らない"}].map(o=>(
            <GCard key={o.id} sel={origin===o.id} onClick={()=>setOrigin(o.id)}>
              <div style={{fontSize:"32px",marginBottom:"10px"}}>{o.icon}</div>
              <div style={{fontSize:"0.9rem",fontWeight:"bold",color:"#e8728a",marginBottom:"6px"}}>{o.name}</div>
              <div style={{fontSize:"0.65rem",color:"#8a7a8a",lineHeight:"1.7"}}>{o.desc}</div>
            </GCard>
          ))}
        </div>
        <GB onClick={goNext} disabled={!origin} full primary style={{marginTop:"16px"}}>次へ →</GB>
      </div>
    </Wrap>
  );

  // ── step2：種族 ────────────────────────────────────
  if(step===2){
    const selR=RACES.find(r=>r.id===race);
    const isOther=race==="other";
    return(
      <Wrap step="② 種族" title="あなたは何者ですか？">
        <div style={{maxWidth:"480px",margin:"0 auto"}}>
          <NavBtns/>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"16px"}}>
            {RACES.map(r=>(
              <button key={r.id} onClick={()=>{setRace(r.id);if(r.id!=="other")setRaceNote("");}}
                style={{padding:"10px 14px",background:race===r.id?"rgba(232,114,138,0.2)":"#0f0c18",
                  color:race===r.id?"#f090b0":"#c8b89a",
                  border:race===r.id?"1px solid #e8728a":"1px solid #2a1a2a",
                  borderRadius:"8px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.85rem"}}>
                {r.icon} {r.name}
              </button>
            ))}
          </div>
          {selR&&!isOther&&(
            <div style={{padding:"14px",background:"rgba(232,114,138,0.06)",border:"1px solid rgba(232,114,138,0.25)",borderRadius:"8px",marginBottom:"14px"}}>
              <div style={{fontSize:"0.85rem",fontWeight:"bold",color:"#e8728a",marginBottom:"6px"}}>{selR.icon} {selR.name}</div>
              <div style={{fontSize:"0.75rem",color:"#c8b89a",marginBottom:"8px",lineHeight:"1.7"}}>{selR.desc}</div>
              {Object.keys(selR.bonus||{}).length>0&&<div style={{fontSize:"0.7rem",color:"#80c080"}}>＋ {Object.entries(selR.bonus).map(([k,v])=>STAT_INFO[k]?.label+"+"+v).join("　")}</div>}
              {Object.keys(selR.pen||{}).length>0&&<div style={{fontSize:"0.7rem",color:"#e08080"}}>－ {Object.entries(selR.pen).map(([k,v])=>STAT_INFO[k]?.label+"-"+v).join("　")}</div>}
            </div>
          )}
          {isOther&&(
            <div style={{padding:"14px",background:"rgba(232,114,138,0.06)",border:"1px solid rgba(232,114,138,0.25)",borderRadius:"8px",marginBottom:"14px"}}>
              <div style={{fontSize:"0.75rem",color:"#e8728a",marginBottom:"8px"}}>どんな存在ですか？（自由記述）</div>
              <input value={raceNote} onChange={e=>setRaceNote(e.target.value)}
                placeholder="例：天人の末裔　例：河童の半妖　例：半人半鬼"
                style={{width:"100%",...INP,boxSizing:"border-box"}}/>
              <div style={{fontSize:"0.6rem",color:"#5a4a6a",marginTop:"6px"}}>入力後に「次へ」が押せます</div>
            </div>
          )}
          <GB onClick={goNext} disabled={!race||(isOther&&!raceNote.trim())} full primary style={{marginTop:"4px"}}>次へ →</GB>
        </div>
      </Wrap>
    );
  }

  // ── step3：性別 ────────────────────────────────────
  if(step===3) return(
    <Wrap step="③ 性別" title="性別は？">
      <div style={{maxWidth:"480px",margin:"0 auto"}}>
        <NavBtns/>
        <div style={{fontSize:"0.7rem",color:"#5a4a6a",marginBottom:"14px"}}>※ ゲームへの影響なし・GMの描写に反映されます</div>
        <div style={{display:"flex",gap:"10px",flexWrap:"wrap",marginBottom:"16px"}}>
          {GENDERS.map(g=>(
            <button key={g.id} onClick={()=>setGender(g.id)}
              style={{flex:"1 1 auto",minWidth:"100px",padding:"16px 8px",
                background:gender===g.id?"rgba(232,114,138,0.2)":"#0f0c18",
                color:gender===g.id?"#f090b0":"#c8b89a",
                border:gender===g.id?"1px solid #e8728a":"1px solid #2a1a2a",
                borderRadius:"10px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.85rem"}}>
              <div style={{fontSize:"20px",marginBottom:"4px"}}>{g.icon}</div>{g.name}
            </button>
          ))}
        </div>
        <GB onClick={goNext} disabled={!gender} full primary>次へ →</GB>
      </div>
    </Wrap>
  );

  // ── step4：職業 ────────────────────────────────────
  if(step===4){
    const selJ=jList.find(j=>j.id===job);
    const isOtherJob=job==="other_j"||job==="other_jo";
    return(
      <Wrap step="④ 職業" title="職業は？">
        <div style={{maxWidth:"480px",margin:"0 auto"}}>
          <NavBtns/>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"16px"}}>
            {jList.map(j=>(
              <button key={j.id} onClick={()=>setJob(j.id)}
                style={{padding:"10px 14px",background:job===j.id?"rgba(232,114,138,0.2)":"#0f0c18",
                  color:job===j.id?"#f090b0":"#c8b89a",
                  border:job===j.id?"1px solid #e8728a":"1px solid #2a1a2a",
                  borderRadius:"8px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.85rem"}}>
                {j.icon} {j.name}
              </button>
            ))}
            {isO&&<button onClick={()=>setJob("amnesiac")}
              style={{padding:"10px 14px",background:job==="amnesiac"?"rgba(232,114,138,0.2)":"#0f0c18",
                color:job==="amnesiac"?"#f090b0":"#c8b89a",
                border:job==="amnesiac"?"1px solid #e8728a":"1px solid #2a1a2a",
                borderRadius:"8px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.85rem"}}>🌀 記憶喪失</button>}
          </div>
          {selJ&&(
            <div style={{padding:"14px",background:"rgba(232,114,138,0.06)",border:"1px solid rgba(232,114,138,0.25)",borderRadius:"8px",marginBottom:"14px"}}>
              <div style={{fontSize:"0.85rem",fontWeight:"bold",color:"#e8728a",marginBottom:"6px"}}>{selJ.icon} {selJ.name}</div>
              {selJ.trait&&<div style={{fontSize:"0.7rem",color:"#c090c0",marginBottom:"6px"}}>✦ {selJ.trait}：{selJ.traitD}</div>}
              {Object.keys(selJ.sb||{}).length>0&&<div style={{fontSize:"0.7rem",color:"#80c080",marginBottom:"6px"}}>＋ {Object.entries(selJ.sb).map(([k,v])=>STAT_INFO[k]?.label+"+"+v).join("　")}</div>}
              <div style={{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"8px"}}>
                {(selJ.items||[]).map((item,i)=><span key={i} style={{padding:"2px 7px",background:"#1a1030",border:"1px solid #3a1a4a",borderRadius:"4px",fontSize:"0.65rem",color:"#e0b0ff"}}>🎒 {item}</span>)}
                <span style={{padding:"2px 7px",background:"#1a1a10",border:"1px solid #3a3a10",borderRadius:"4px",fontSize:"0.65rem",color:"#f0d080"}}>💰 {selJ.gold}文</span>
              </div>
              <FL label={isOtherJob?"職業の詳細（自由記述・必須）":"職業の補足（任意）"}>
                <input value={jobNote} onChange={e=>setJobNote(e.target.value)}
                  placeholder={isOtherJob?"例：里の薬師　例：幽霊退治の専門家":"例：師匠に破門されかけている問題児"}
                  style={{width:"100%",...INP,boxSizing:"border-box"}}/>
              </FL>
            </div>
          )}
          {isAm&&job==="amnesiac"&&<FL label="記憶の断片"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginTop:"8px"}}>{FRAGS.map(f=><GCard key={f.id} sel={frag===f.id} onClick={()=>setFrag(f.id)} row><span style={{fontSize:"18px"}}>{f.icon}</span><div style={{marginLeft:"8px"}}><div style={{fontSize:"0.75rem",fontWeight:"bold",color:"#e8b0a0"}}>{f.name}</div><div style={{fontSize:"0.65rem",color:"#7a6a8a",marginTop:"2px"}}>🎁 {f.item}</div></div></GCard>)}</div></FL>}
          <GB onClick={goNext} disabled={!job||(job==="amnesiac"&&!frag)||(isOtherJob&&!jobNote.trim())} full primary style={{marginTop:"8px"}}>次へ →</GB>
        </div>
      </Wrap>
    );
  }

  // ── step5：特技 ────────────────────────────────────
  if(step===5) return(
    <Wrap step="⑤ 特技" title="特技を選んでください">
      <div style={{maxWidth:"480px",margin:"0 auto"}}>
        <NavBtns/>
        <div style={{fontSize:"0.65rem",color:"#5a4a6a",marginBottom:"12px"}}>0〜2つ選択可。スキップしても大丈夫です。</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"12px"}}>
          {TRAITS_POOL.map(t=>{
            const sel=traits.includes(t.id);
            // 「なし」は他を選んでいたらグレーアウト（消さない）
            const noneDisabled=t.id==="none"&&traits.length>0&&!traits.includes("none");
            const otherDisabled=t.id!=="none"&&!sel&&(traits.length>=2||traits.includes("none"));
            const dis=noneDisabled||otherDisabled;
            return(
              <GCard key={t.id} sel={sel} onClick={()=>!dis&&togTrait(t.id)} row style={{opacity:dis?0.25:1,cursor:dis?"not-allowed":"pointer",filter:dis?"grayscale(80%)":"none"}}>
                <span style={{fontSize:"16px"}}>{t.icon}</span>
                <div style={{marginLeft:"8px",flex:1,minWidth:0}}>
                  <div style={{fontSize:"0.75rem",fontWeight:"bold",color:sel?"#f0d080":"#c0a090"}}>{t.name}</div>
                  <div style={{fontSize:"0.6rem",color:"#7a6a7a",marginTop:"2px",lineHeight:"1.4"}}>{t.desc}</div>
                </div>
                {sel&&<span style={{marginLeft:"auto",color:"#f0d080",flexShrink:0}}>✓</span>}
              </GCard>
            );
          })}
        </div>
        <FL label="カスタム特技（任意・自由記述）">

  return(
    <Wrap step="⑦ 確認" title="以下の設定で始めます">

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"16px"}}>

          </CB>

          </CB>
          <CB title="最終STAT" style={{gridColumn:"1/-1"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:"4px",marginBottom:"6px"}}>
              {STAT_NORMAL.map(k=>{const dv=es[k]-(stats[k]||8);return(<div key={k} style={{textAlign:"center",padding:"5px 2px",background:"#0f0c18",borderRadius:"3px"}}><div style={{fontSize:"9px",color:"#6a5a6a"}}>{STAT_INFO[k].label}</div><div style={{fontSize:"0.85rem",color:"#f0d080",fontWeight:"bold"}}>{es[k]}</div>{dv!==0&&<div style={{fontSize:"9px",color:dv>0?"#80e080":"#e08080"}}>{dv>0?"+":""}{dv}</div>}</div>);})}
            </div>
            <div style={{padding:"5px 8px",background:"rgba(100,80,160,0.1)",borderRadius:"4px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

          {startLoc&&(()=>{const loc=START_LOCS.find(l=>l.id===startLoc);return loc?(
            <div style={{padding:"10px 12px",background:"rgba(232,114,138,0.05)",borderRadius:"6px",borderLeft:"3px solid "+loc.color,marginBottom:"12px"}}>

      </div>
    </Wrap>
  );
}

function freqLabel(v){
  if(v<=15)return{label:"戦闘・異変特化",icon:"⚔⚔",desc:"ほぼ毎ターン戦闘・異変が発生する",color:"#e05050"};
  if(v<=35)return{label:"戦闘多め",      icon:"⚔",  desc:"戦闘と異変が多め、日常は少なめ",color:"#e08050"};
  if(v<=65)return{label:"バランス",       icon:"⚖",  desc:"戦闘・日常・会話をバランスよく",color:"#e8728a"};
  if(v<=85)return{label:"日常多め",       icon:"🌸", desc:"日常と会話が多め、戦闘は少なめ",color:"#a0c080"};
  return          {label:"日常・会話特化", icon:"🌸🌸",desc:"ほぼ日常シーン・穏やかな物語",  color:"#60c060"};
}
function freqToPrompt(ev){
  // evは数値（旧）またはオブジェクト{scale,freq,nature,waitPC}
  if(typeof ev==="number"){
    if(ev<=15)return"ほぼ毎ターン戦闘・異変を発生させる";
    if(ev<=35)return"戦闘と異変を多めに発生させる";
    if(ev<=65)return"戦闘・異変・日常をバランスよく展開する";
    if(ev<=85)return"日常と会話を多めに展開する";
    return"日常と会話劇を中心に展開する";
  }
  const {scale=50,freq=50,nature=50,waitPC=false}=ev;
  const scaleStr=scale<=25?"幻想郷全体に関わる大きな異変規模で":scale<=50?"地域レベルの出来事として":scale<=75?"近所レベルの小さな出来事として":"身近な日常の範囲内で";
  const freqStr=freq<=25?"毎ターン積極的にイベントを発生させる":freq<=50?"頻繁にイベントを発生させる":freq<=75?"たまにイベントを発生させる":"イベントはまれにしか発生させない";
  const natureStr=nature<=25?"戦闘・スペルカード勝負を中心に展開する":nature<=50?"対立・緊張感のある展開を多めにする":nature<=75?"ハプニングや騒動を中心に展開する":"日常的な交流・会話を中心に展開する";
  const waitStr=waitPC?"PCが行動を宣言するまでGMは一切イベントを起こさない。宣言があった時だけ、その内容に沿ってスライダー設定に従い展開する。何も宣言がなければ「穏やかな時間が流れている」と描写するだけにとどめる":"GMは自発的にイベントを仕掛けてよい";
  return`${scaleStr}、${freqStr}。性質は${natureStr}。${waitStr}。`;
}

// API未設定時のデモ応答（土台：画面遷移・選択肢・セーブの動作確認用）
function makeDemoGMResult(action, gs, isOpening){
  const loc=gs?.scene?.location||"幻想郷";
  const name=gs?.player?.name||"旅人";
  const narrative=isOpening
    ?`${loc}。${name}の物語が静かに始まった。風に桜の香りが混じる。（デモモード：APIキーを設定するとAI-GMが動きます）`
    :`「${action}」——${loc}で出来事が動き出す。デモ応答のため簡略描写です。`;
  return{
    narrative,
    playerUpdate:{},
    sceneUpdate:{location:loc,description:narrative.slice(0,48),time:gs?.scene?.time||"朝",weather:gs?.scene?.weather||"晴れ",enemies:[]},
    importantLogEntry:isOpening?"デモセッション開始":null,
    questUpdate:null,
    npcAffinityUpdate:null,
    choices:["周囲を見回す","誰かに話しかける","しばらく休む"],

    event:null,

}

function Settings({gmStyle,setGmStyle,evFreq,setEvFreq,form,setForm,onStart,apiKey,onBackToConfirm,onRestart}){
  const [storyteller,setStoryteller]=useState("random");
  const [waitPC,setWaitPC]=useState(false);
  const [aiDesc,setAiDesc]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [revealTeller,setRevealTeller]=useState(false);
  const [finalName,setFinalName]=useState(form?.name&&form.name!=="？"?form.name:"");

  // おまかせの場合はランダムで実際のテラーを決定
  const actualTeller=storyteller==="random"
    ? STORYTELLERS[Math.floor(Math.random()*6)]
    : STORYTELLERS.find(t=>t.id===storyteller)||STORYTELLERS[0];

  const generateDesc=async()=>{
    setAiLoading(true);setAiDesc("");
    const teller=storyteller==="random"?actualTeller:STORYTELLERS.find(t=>t.id===storyteller)||STORYTELLERS[0];
    const charaInfo=form?(
      form.isPreset
        ? `PC：${form.presetData.name}（${form.presetData.desc?.slice(0,40)||""}）。活動拠点：${form.presetData.loc}`
        : form.origin==="unknown"
          ? `PC：謎の存在（正体不明）`
          : `PC：${form.name||"オリジナルキャラ"}（${form.origin==="resident"?"幻想郷住人":"外来人"}）`
    ):"";
    const prompt=`東方ProjectのTRPGのGM設定が以下の通りです。この設定で展開される幻想郷の雰囲気を100字程度で詩的に描写してください。JSONや前置き不要。描写文のみ。

${charaInfo?`PC情報：${charaInfo}
`:""}ストーリーテラー：${teller.name}（${teller.desc}）
PC宣言待ち：${waitPC?"はい":"いいえ"}`;
    try{
      const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
        body:JSON.stringify({model:"anthropic/claude-sonnet-4-5",max_tokens:200,messages:[{role:"user",content:prompt}]})
      });
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      setAiDesc((data.choices?.[0]?.message?.content||"").trim());
    }catch(e){setAiDesc(`失敗：${e.message}`);}
    setAiLoading(false);
  };

  const handleStart=()=>{
    const teller=storyteller==="random"?actualTeller:STORYTELLERS.find(t=>t.id===storyteller)||STORYTELLERS[0];
    const evConf={storyteller:teller.id,actualTeller:teller,waitPC};
    setEvFreq(evConf);
    if(form){
      const updated={...form,name:finalName||"？"};
      if(setForm)setForm(updated);
      onStart(updated,evConf);
    }else{
      onStart(null,evConf);
    }
  };

  return(
    <Wrap step="STEP 3 / 3" title="GM設定">
      <div style={{maxWidth:"480px",margin:"0 auto"}}>
        {/* 文体 */}
        <FL label="GMの文体">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginTop:"8px"}}>
            {GM_STYLES.map(s=><GCard key={s.id} sel={gmStyle===s.id} onClick={()=>setGmStyle(s.id)} row><div><div style={{fontSize:"0.85rem",fontWeight:"bold",color:"#e8a0b0"}}>{s.name}</div><div style={{fontSize:"0.65rem",color:"#6a5a7a",marginTop:"2px"}}>{s.desc}</div></div></GCard>)}
          </div>
        </FL>

        {/* ストーリーテラー */}
        <FL label="ストーリーテラー" style={{marginTop:"20px"}}>
          <div style={{fontSize:"0.65rem",color:"#5a4a6a",marginBottom:"10px"}}>
            GMの人格・価値観を決めます。物語の傾向に影響します。
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"10px"}}>
            {STORYTELLERS.map(t=>(
              <GCard key={t.id} sel={storyteller===t.id} onClick={()=>setStoryteller(t.id)} row>
                <span style={{fontSize:"20px",marginRight:"8px"}}>{t.icon}</span>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:"0.75rem",fontWeight:"bold",color:storyteller===t.id?t.color:"#c8b89a"}}>{t.name}</div>
                  <div style={{fontSize:"0.65rem",color:"#5a4a6a",marginTop:"1px"}}>{t.desc}</div>
                  {t.id!=="random"&&<div style={{fontSize:"9px",color:"#4a3a5a",marginTop:"1px"}}>{t.detail}</div>}
                </div>
              </GCard>
            ))}
          </div>
          {storyteller==="random"&&(
            <div style={{fontSize:"0.65rem",color:"#7a5a7a",padding:"6px 10px",background:"#0f0c18",borderRadius:"4px",marginBottom:"10px"}}>
              🎲 セッション開始時にランダム選択・非公開。終了後に確認できます。
            </div>
          )}
        </FL>

        {/* PC宣言待ち */}
        <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"12px 14px",background:"#0f0c18",border:"1px solid #2a1a2a",borderRadius:"8px",marginBottom:"16px",cursor:"pointer"}} onClick={()=>setWaitPC(!waitPC)}>
          <div style={{width:"18px",height:"18px",borderRadius:"3px",flexShrink:0,background:waitPC?"#e8728a":"transparent",border:`2px solid ${waitPC?"#e8728a":"#4a2a4a"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {waitPC&&<span style={{color:"#fff",fontSize:"0.85rem",lineHeight:1}}>✓</span>}
          </div>
          <div>
            <div style={{fontSize:"0.75rem",color:waitPC?"#f090b0":"#6a5a7a",fontWeight:waitPC?"bold":"normal"}}>
              PCが宣言するまでGMはイベントを起こさない
            </div>
            <div style={{fontSize:"0.65rem",color:"#4a3a5a",marginTop:"2px"}}>
              {waitPC?"宣言内容に対してのみ反応。何もしなければ平和な日々が続く":"GMがテラーの性格に従って自発的に動く"}
            </div>
          </div>
        </div>

        {/* AI雰囲気描写 */}
        <div style={{marginBottom:"16px"}}>
          <GB onClick={generateDesc} disabled={aiLoading} ghost style={{width:"100%",padding:"8px",fontSize:"0.75rem"}}>
            {aiLoading?"✦ AIが描写中...":"✨ AIにこの設定の雰囲気を描写してもらう"}
          </GB>
          {aiDesc&&(
            <div style={{marginTop:"8px",padding:"12px 14px",background:"rgba(232,114,138,0.06)",border:"1px solid rgba(232,114,138,0.2)",borderRadius:"8px",fontSize:"0.75rem",color:"#c8a0b8",lineHeight:"2",fontStyle:"italic"}}>
              ✦ {aiDesc}
            </div>
          )}
        </div>

        {/* 名前入力（AI描写の下） */}
        {!form?.isPreset&&<div style={{padding:"16px",background:"rgba(232,114,138,0.06)",border:"1px solid rgba(232,114,138,0.25)",borderRadius:"10px",marginBottom:"8px"}}>
          <div style={{fontSize:"0.75rem",color:"#e8728a",marginBottom:"10px"}}>最後に、あなたの名前（愛称）を教えて？</div>
          <div style={{display:"flex",gap:"8px"}}>
            <input value={finalName} onChange={e=>setFinalName(e.target.value)}
              placeholder="わからなければ「？」でも可"
              style={{flex:1,...INP,boxSizing:"border-box"}}/>
            <GB ghost onClick={()=>setFinalName(randName())} style={{padding:"9px 12px",fontSize:"0.85rem"}}>🎲</GB>
          </div>
        </div>}

        {form&&<BBox pink style={{marginTop:"8px"}}>
          🌸 {form.isPreset?form.presetData.name:form.origin==="unknown"?"謎の存在":(finalName||"？")}の物語が始まります
        </BBox>}

        {/* ナビゲーション */}
        <div style={{display:"flex",gap:"8px",marginTop:"20px"}}>
          {!form?.isPreset&&<GB ghost onClick={onBackToConfirm} style={{flex:"0 0 110px"}}>← 一つ戻る</GB>}
          <GB onClick={handleStart} full primary>幻想郷へ踏み出す 🌸</GB>
        </div>
        <button onClick={onRestart}
          style={{width:"100%",marginTop:"10px",padding:"8px",background:"transparent",color:"#5a4a6a",border:"1px solid #3a2a3a",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem"}}>
          最初からやり直す
        </button>
      </div>
    </Wrap>
  );
}

${action}`:`現在状態:${JSON.stringify({player:gs.player,scene:gs.scene,recentLog:gs.history.slice(-8).map(h=>h.text),currentState:gs.currentState,npcs:gs.npcs},null,2)}

プレイヤー行動:"${action}"`;

  const applyR=(result,action)=>{

      }
      const iLog=[...prev.importantLog];
      if(result.importantLogEntry)iLog.push({text:result.importantLogEntry,turn:prev.turn+1});
      const quests=[...prev.quests];
      if(result.questUpdate){if(result.questUpdate.action==="add")quests.push({name:result.questUpdate.name,detail:result.questUpdate.detail,status:"active",turn:prev.turn+1});else{const idx=quests.findIndex(q=>q.name===result.questUpdate.name);if(idx>=0)quests[idx].status="complete";}}

          npcs[idx]={...npcs[idx],
            affinity:Math.max(-100,Math.min(100,npcs[idx].affinity+(nu.delta||0))),
            tag:nu.tag||npcs[idx].tag||"acquaint",
            memo:nu.memo||npcs[idx].memo||""

        }
      }

      // 返さない場合は夜→朝の遷移で自動加算
      const prevTime=prev.scene?.time||"朝";
      const newTime=result.sceneUpdate?.time||prevTime;

      let newDay=prev.scene?.day||1;

      // スキル自然成長チェック：AIがスキルを更新した場合に成長ログを追加

        const btnTextColor=isSpell?(loading?"#444":"#c070e0"):isTech?(loading?"#444":"#8090d0"):(loading?"#444":"#6a6a8a");
        const btnBorder=isSpell?"1px solid rgba(160,80,200,0.4)":isTech?"1px solid rgba(100,100,200,0.3)":"1px solid rgba(60,60,80,0.3)";
        // 代償テキスト取得（スキル名に【代償】が含まれている場合）
        const costMatch=s.match(/【([^】]+)】/);
        const costText=costMatch?costMatch[1]:null;
        return(
          <div key={i} style={{padding:"4px 6px",marginBottom:"3px",background:"#0f0c18",borderRadius:"4px",fontSize:"0.65rem",borderLeft:`2px solid ${rankColor}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:"#c8b89a"}}>✦ {sname}</span>
              {rank&&<span style={{color:rankColor,fontSize:"0.55rem"}}>{rank}</span>}
            </div>
            {costText&&<div style={{fontSize:"0.55rem",color:"#8a6a4a",marginTop:"1px"}}>代償：{costText}</div>}
            <button onClick={()=>act(declareText)} disabled={loading}
              style={{marginTop:"4px",width:"100%",padding:"3px 0",background:btnColor,color:btnTextColor,border:btnBorder,borderRadius:"3px",cursor:loading?"not-allowed":"pointer",fontFamily:"inherit",fontSize:"0.6rem"}}>
              {btnLabel}
            </button>
          </div>
        );
      })}</div>
      {(gs.npcs||[]).length>0&&<><RL>NPC関係</RL>
        <div style={{marginBottom:"11px"}}>{gs.npcs.map((n,i)=>{
          const tagInfo=NPC_TAGS.find(t=>t.id===(n.tag||"acquaint"))||NPC_TAGS[NPC_TAGS.length-1];
          const barColor=n.affinity>=50?"#60c060":n.affinity>=0?"#e8728a":"#e05050";
          return(<div key={i} style={{padding:"5px 7px",marginBottom:"4px",background:"#0f0c18",borderRadius:"4px",fontSize:"0.65rem",borderLeft:"2px solid "+tagInfo.color}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"2px"}}>
              <span style={{color:"#c8b89a",fontWeight:"bold"}}>{n.name}</span>
              <span style={{fontSize:"0.6rem",color:tagInfo.color,padding:"1px 5px",background:"rgba(0,0,0,0.3)",borderRadius:"3px"}}>{tagInfo.icon} {tagInfo.label}</span>
            </div>
            {n.memo&&<div style={{fontSize:"0.55rem",color:"#6a5a6a",marginBottom:"2px",fontStyle:"italic"}}>{n.memo}</div>}
            <div style={{height:"3px",background:"#1a0a1a",borderRadius:"2px"}}>
              <div style={{height:"100%",width:Math.max(0,(n.affinity+100)/2)+"%",background:barColor,borderRadius:"2px"}}/>
            </div>
            <div style={{textAlign:"right",fontSize:"0.5rem",color:"#4a3a4a",marginTop:"1px"}}>{n.affinity>0?"+":""}{n.affinity}</div>
          </div>);
        })}</div>
      </>}
      {(gs.achievements||[]).length>0&&<><RL>称号</RL>{gs.achievements.map((a,i)=><div key={i} style={{padding:"2px 6px",marginBottom:"2px",background:"#0f0c18",borderRadius:"3px",fontSize:"0.65rem",color:"#f0d080"}}>🏆 {a}</div>)}</>}
    </>
  );

  const logPanelEl=(
    <>
      {(gs?.importantLog||[]).length===0
        ?<div style={{fontSize:"0.75rem",color:C_DIM,textAlign:"center",marginTop:"20px",lineHeight:"1.7"}}>重要イベントが<br/>ここに記録されます</div>
        :gs.importantLog.map((l,i)=><div key={i} style={{padding:"5px 7px",marginBottom:"5px",background:"#110818",borderRadius:"4px",borderLeft:"2px solid #e8728a",fontSize:"0.75rem",lineHeight:"1.6",color:"#d0c0c8"}}><div style={{color:C_META,fontSize:"0.65rem",marginBottom:"1px"}}>Turn {l.turn}</div>{l.text}</div>)
      }
      {(gs?.quests||[]).filter(q=>q.status==="active").length>0&&<div style={{marginTop:"10px"}}><div style={{fontSize:"0.65rem",color:"#9050a0",letterSpacing:"1px",marginBottom:"5px"}}>◆ クエスト</div>{gs.quests.filter(q=>q.status==="active").map((q,i)=><div key={i} style={{padding:"4px 7px",marginBottom:"3px",background:"#110818",borderRadius:"4px",borderLeft:"2px solid #9050a0",fontSize:"0.7rem",color:"#b090c0"}}>📜 {q.name}</div>)}</div>}
      {(gs?.playableChars||[]).length>0&&<div style={{marginTop:"10px"}}><div style={{fontSize:"0.65rem",color:"#e8728a",letterSpacing:"1px",marginBottom:"5px"}}>◆ 仲間</div>{gs.playableChars.map((c,i)=><div key={i} style={{padding:"4px 7px",marginBottom:"3px",background:"#110818",borderRadius:"4px",borderLeft:"2px solid #e8728a",fontSize:"0.7rem",color:"#f0d0e0"}}>🌸 {c.name}</div>)}</div>}
    </>
  );

  // イベント設定スライダーパネル（共通）
  // EventSlider moved to global scope


  // ── 入力エリア（共通）───────────────────────
  const inputAreaEl=(
    <div style={{background:"#0d0a18",borderTop:"1px solid #1a0a1a",padding:"0.5rem 0.75rem",flexShrink:0,position:"sticky",bottom:0,zIndex:4,boxShadow:"0 -6px 16px rgba(0,0,0,0.45)"}}>
      {/* 時間モード */}
      <div style={{display:"flex",gap:"5px",marginBottom:"7px"}}>
        {[{id:"normal",label:"▶ 通常"},{id:"short",label:"⏩ 数日"},{id:"long",label:"⏭ 季節"}].map(m=>(
          <button key={m.id} onClick={()=>setTMode(m.id)} style={{padding:"3px 8px",fontSize:"0.65rem",borderRadius:"3px",background:tMode===m.id?"rgba(232,114,138,0.2)":"transparent",color:tMode===m.id?"#f090b0":"#4a3a5a",border:tMode===m.id?"1px solid #e8728a":"1px solid #2a1a2a",cursor:"pointer",fontFamily:"inherit"}}>{m.label}</button>
        ))}
      </div>
      {/* 選択肢 */}
      {gs?.choices?.length>0&&!loading&&(
        <div style={{display:"flex",gap:"5px",marginBottom:"7px",flexWrap:"wrap"}}>
          {gs.choices.map((c,i)=>(
            <button key={i} onClick={()=>act(c)} style={{flex:"1 1 auto",padding:"6px 8px",minWidth:"100px",background:"#110818",color:"#c8b89a",border:"1px solid #2a1a2a",borderRadius:"4px",cursor:"pointer",fontSize:"0.7rem",fontFamily:"inherit",textAlign:"left"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="#e8728a"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="#2a1a2a"}
            ><span style={{color:"#e8728a",marginRight:"4px"}}>{["①","②","③"][i]}</span>{c}</button>
          ))}
        </div>
      )}
      {/* 自由入力 */}
      <div style={{display:"flex",gap:"6px",marginBottom:"6px"}}>
        <input
          className="game-inp-action"
          value={inp}
          onChange={e=>setInp(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();act(inp);}}}
          placeholder={tMode==="short"?"数日間の過ごし方…":tMode==="long"?"季節の過ごし方…":"行動を宣言…"}
          disabled={!gs?.gameStarted||loading}
          style={{flex:1,...INP,fontSize:"0.9rem"}}
        />
        <GB onClick={()=>act(inp)} disabled={!gs?.gameStarted||loading||!inp.trim()} primary style={{padding:"8px 14px",fontSize:"0.75rem"}}>宣言</GB>
      </div>
      {/* GM注文 */}
      <div className="game-gm-row" style={{display:"flex",gap:"6px",padding:"5px 8px",background:"#100e18",border:"1px solid #3a3548",borderRadius:"4px"}}>
        <span style={{fontSize:"0.7rem",color:"#b0b0c8",whiteSpace:"nowrap",alignSelf:"center"}}>🔧</span>
        <input
          className="game-inp-gm"
          value={gmInp}
          onChange={e=>setGmInp(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();sendNote();}}}
          placeholder="GM注文・認識確認（物語に影響しません）"
          disabled={!gs?.gameStarted||loading}
          style={{flex:1,padding:"0.35rem 0.5rem",border:"none",fontFamily:"inherit",fontSize:"0.8rem",outline:"none"}}
        />
        <GB ghost onClick={sendNote} disabled={!gs?.gameStarted||loading||!gmInp.trim()} style={{padding:"2px 8px",fontSize:"0.7rem",color:"#c8b8e0",borderColor:"#6a6090"}}>送信</GB>
      </div>
    </div>
  );

  // ── ヘッダー（共通）────────────────────────
  const headerEl=(
    <>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 12px",background:"#0d0a18",borderBottom:"1px solid #2a1a2a",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <span style={{fontSize:"1rem",color:"#e8728a",fontWeight:"bold",letterSpacing:"2px"}}>🌸 幻想郷</span>
          <span style={{fontSize:"0.75rem",color:C_META}}>📍{gs?.scene.location}</span>
          <span style={{fontSize:"0.7rem",color:"#5a4a6a"}}>{formatDay(gs?.scene?.day||1)}</span>
          {isPC&&<span style={{fontSize:"0.75rem",color:C_META}}>🕐{gs?.scene.time}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"6px",fontSize:"0.75rem",color:C_META}}>
          <span>T{gs?.turn||0}</span>
          <button onClick={()=>setShowEndMenu(true)} style={{padding:"3px 10px",background:"transparent",color:"#c8a0b8",border:"1px solid #4a2a4a",borderRadius:"4px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.7rem"}}>≡ メニュー</button>
        </div>
      </div>
      {/* キャラ切替 */}


    </>
  );

  // ── メインログエリア ─────────────────────────
  const storyAreaEl=(
    <div ref={logRef} style={{flex:1,overflowY:"auto",padding:"0.85rem",background:"#07050e",minHeight:0}}>
      {!gs?.gameStarted?(
        <div style={{textAlign:"center",marginTop:"60px"}}>
          <div style={{fontSize:"48px",marginBottom:"12px"}}>{gs?.player?.isPreset?PRESET_CHARS.find(p=>p.id===gs.player.presetId)?.icon||"🌸":"🌸"}</div>
          <div style={{fontSize:"17px",color:"#e8728a",marginBottom:"6px",letterSpacing:"3px"}}>幻想郷</div>
          <div style={{fontSize:"0.9rem",color:C_LABEL,marginBottom:"6px"}}>{gs?.player?.name}</div>
          <div style={{fontSize:"0.8rem",color:C_DIM,marginBottom:"24px",lineHeight:"2"}}>
            {gs?.player?.background?.origin==="resident"?"幻想郷の住人として":"外の世界から迷い込んだ者として"}物語が始まる
          </div>
          <GB onClick={startGame} disabled={loading} primary style={{padding:"12px 36px",fontSize:"0.9rem",letterSpacing:"3px"}}>{loading?"準備中...":"物語を始める 🌸"}</GB>
        </div>
      ):log.map((e,i)=><LE key={i} e={e}/>)}
    </div>
  );

  const thinkingBarEl=<GmThinkingBar loading={loading} model={model} loadSec={loadSec} loadHint={loadHint}/>;

  // ── PC版レイアウト ──────────────────────────
  // ── ゲームオーバー画面 ─────────────────────────────
  if(gameOver) return(
    <div style={{height:"100dvh",background:"#07050e",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"inherit",color:"#c8b89a",padding:"20px"}}>
      <div style={{textAlign:"center",maxWidth:"400px"}}>
        <div style={{fontSize:"64px",marginBottom:"16px",opacity:0.4}}>👻</div>
        <h2 style={{fontSize:"1.4rem",color:"#8a6a8a",letterSpacing:"4px",marginBottom:"8px"}}>存在が消えた</h2>
        <div style={{width:"60px",height:"1px",margin:"16px auto",background:"linear-gradient(90deg,transparent,#6a4a6a,transparent)"}}/>
        <p style={{fontSize:"0.8rem",color:"#5a4a5a",lineHeight:"2.2",marginBottom:"32px"}}>
          あなたの存在は幻想郷に溶け込み、<br/>誰にも覚えられることなく消えていった。<br/>
          <span style={{fontSize:"0.7rem",color:"#4a3a4a"}}>それもまた、幻想郷の理のひとつ。</span>
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:"10px",alignItems:"center"}}>
          <GB onClick={()=>{setGameOver(false);setFadeLevel(0);setLog([]);setGs(p=>({...p,gameStarted:false,turn:0,history:[],player:{...p.player,hp:p.player.maxHp,mp:p.player.maxMp}}));}} primary style={{padding:"10px 32px",fontSize:"0.9rem",letterSpacing:"2px"}}>🌸 同じキャラで再挑戦</GB>
          <GB ghost onClick={onReturnToTitle} style={{padding:"8px 24px",fontSize:"0.8rem"}}>↩ タイトルへ戻る</GB>
        </div>
      </div>
    </div>
  );

  // ── 終了メニューオーバーレイ ──────────────────────
  // APIキー確認モーダル
  const apiModal=showApiModal?(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowApiModal(false)}>
      <div style={{background:"#0d0a18",border:"1px solid #3a1a3a",borderRadius:"12px",padding:"24px",width:"300px"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:"0.85rem",color:"#e8728a",marginBottom:"6px",letterSpacing:"2px"}}>◆ API通信確認</div>
        <div style={{width:"40px",height:"1px",margin:"0 auto 16px",background:"linear-gradient(90deg,transparent,#e8728a,transparent)"}}/>
        <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
          <input type={apiShow?"text":"password"} value={apiKeyLocal}
            onChange={e=>{setApiKeyLocal(e.target.value);setApiTestState("idle");setApiTestMsg("");}}
            placeholder="sk-or-v1-...（空欄でデモ）"
            style={{flex:1,...INP,fontSize:"0.75rem",boxSizing:"border-box"}}/>
          <button onClick={()=>setApiShow(s=>!s)}
            style={{padding:"8px 10px",background:"transparent",color:"#8a7a8a",border:"1px solid #3a2a3a",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.7rem"}}>
            {apiShow?"隠す":"表示"}
          </button>
        </div>
        <button onClick={testApiKey} disabled={!apiKeyLocal.trim()||apiTestState==="testing"}
          style={{width:"100%",padding:"9px",background:"rgba(90,70,100,0.2)",color:apiTcColor,border:`1px solid ${apiTcColor}`,borderRadius:"6px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.8rem",marginBottom:"8px"}}>
          {apiTcLabel}
        </button>
        {apiTestMsg&&<div style={{padding:"8px 10px",background:apiTestState==="ok"?"rgba(60,180,60,0.1)":"rgba(200,50,50,0.1)",borderRadius:"6px",fontSize:"0.75rem",color:apiTcColor,marginBottom:"10px"}}>{apiTestMsg}</div>}
        <button onClick={()=>setShowApiModal(false)}
          style={{width:"100%",padding:"8px",background:"transparent",color:"#5a4a6a",border:"1px solid #3a2a3a",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit",fontSize:"0.75rem"}}>
          ✕ 閉じる
        </button>
      </div>
    </div>
  ):null;

  const endMenuOverlay=showEndMenu?(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowEndMenu(false)}>
      <div style={{background:"#0d0a18",border:"1px solid #3a1a3a",borderRadius:"12px",padding:"24px",width:"300px",textAlign:"center"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:"0.85rem",color:"#e8728a",marginBottom:"6px",letterSpacing:"2px"}}>◆ メニュー</div>
        <div style={{width:"40px",height:"1px",margin:"0 auto 16px",background:"linear-gradient(90deg,transparent,#e8728a,transparent)"}}/>
        <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
          {/* 表示設定 */}
          <div style={{padding:"10px 12px",background:"#0f0c18",border:"1px solid #2a1a2a",borderRadius:"8px",textAlign:"left"}}>
            <div style={{fontSize:"0.65rem",color:"#e8728a",letterSpacing:"2px",marginBottom:"8px"}}>◆ 表示設定</div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px"}}>
              {FONTS.map(f=>(
                <button key={f.id} onClick={()=>{applyAppFont(f.id);setFontId(f.id);localStorage.setItem("trpg_fontid",f.id);}}
                  style={{padding:"5px 4px",fontSize:"0.6rem",borderRadius:"4px",textAlign:"left",
                    background:fontId===f.id?"rgba(232,114,138,0.2)":"#0f0c18",
                    color:fontId===f.id?"#f090b0":"#888",
                    border:fontId===f.id?"1px solid #e8728a":"1px solid #2a1a2a",
                    cursor:"pointer",fontFamily:f.val}}>
                  {f.label}
                </button>
              ))}
            </div>
          </div>
          {/* テラー変更 */}
          <div style={{padding:"10px 12px",background:"#0f0c18",border:"1px solid #2a1a2a",borderRadius:"8px",textAlign:"left"}}>
            <div style={{fontSize:"0.65rem",color:"#e8728a",letterSpacing:"2px",marginBottom:"8px"}}>◆ ストーリーテラー</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px"}}>
              {STORYTELLERS.map(t=>(
                <button key={t.id} onClick={()=>{
                  const actual=t.id==="random"?STORYTELLERS[Math.floor(Math.random()*6)]:t;
                  setGs(p=>({...p,evFreq:{...p.evFreq,storyteller:t.id,actualTeller:actual}}));
                }}
                  style={{padding:"5px 6px",fontSize:"0.6rem",borderRadius:"4px",textAlign:"left",
                    background:gs?.evFreq?.storyteller===t.id?"rgba(232,114,138,0.2)":"#0f0c18",
                    color:gs?.evFreq?.storyteller===t.id?t.color:"#888",
                    border:gs?.evFreq?.storyteller===t.id?"1px solid "+t.color:"1px solid #2a1a2a",
                    cursor:"pointer",fontFamily:"inherit"}}>
                  {t.icon} {t.name}
                </button>
              ))}
            </div>
          </div>
          {/* セーブ・終了 */}
          <GB onClick={()=>{setShowEndMenu(false);setShowApiModal(true);}} ghost style={{width:"100%",padding:"10px",fontSize:"0.8rem",borderColor:"#4a3a6a",color:"#c0a0e0"}}>🔌 API通信確認</GB>
          <GB onClick={()=>{setShowEndMenu(false);onRetire();}} ghost style={{width:"100%",padding:"10px",fontSize:"0.8rem"}}>💾 セーブして終了</GB>
          <GB onClick={()=>{setShowEndMenu(false);onReturnToTitle();}} ghost style={{width:"100%",padding:"10px",fontSize:"0.8rem",color:"#c07070",borderColor:"#703030"}}>🚪 セーブせず終了</GB>
          <GB onClick={()=>setShowEndMenu(false)} style={{width:"100%",padding:"10px",fontSize:"0.8rem"}}>✕ 閉じる</GB>
        </div>
      </div>
    </div>
  ):null;

  if(isPC) return(
    <div style={{height:"100dvh",maxHeight:"100dvh",display:"flex",flexDirection:"column",background:"#07050e",fontFamily:"inherit",color:"#c8b89a",overflow:"hidden",fontSize:"1rem"}}>
      {apiModal}
      {endMenuOverlay}
      {endMenuOverlay}
      {headerEl}
      {thinkingBarEl}
      <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>
        {/* 左 */}
        <div style={{width:"11rem",flexShrink:0,background:"#09060f",borderRight:"1px solid #1a0a1a",display:"flex",flexDirection:"column",overflow:"hidden",minHeight:0}}>
          <div style={{padding:"0.45rem 0.65rem",borderBottom:"1px solid #1a0a1a",fontSize:"0.65rem",color:"#e8728a",letterSpacing:"2px",flexShrink:0}}>◆ 重要ログ</div>
          <div style={{flex:1,overflowY:"auto",padding:"0.45rem",minHeight:0}}>{logPanelEl}</div>
        </div>
        {/* 中央 */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0,minHeight:0}}>
          {storyAreaEl}
          {inputAreaEl}
        </div>
        {/* 右 */}
        <div style={{width:"12.5rem",flexShrink:0,background:"#09060f",borderLeft:"1px solid #1a0a1a",overflowY:"auto",padding:"0.65rem",minHeight:0}}>
          {gs&&statusPanelEl}
        </div>
      </div>
    </div>
  );

  // ── スマホ版レイアウト ───────────────────────
  const TABS=[
    {id:"story", icon:"📖", label:"物語"},
    {id:"status",icon:"⚔",  label:"ステータス"},
    {id:"log",   icon:"📋", label:"ログ"},
  ];
  return(
    <div style={{height:"100dvh",maxHeight:"100dvh",display:"flex",flexDirection:"column",background:"#07050e",fontFamily:"inherit",color:"#c8b89a",overflow:"hidden",fontSize:"1rem"}}>
      {apiModal}
      {endMenuOverlay}
      {headerEl}
      {thinkingBarEl}
      {/* タブバー */}
      <div style={{display:"flex",background:"#0d0a18",borderBottom:"1px solid #2a1a2a",flexShrink:0}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setMobileTab(t.id)} style={{flex:1,padding:"0.5rem 0.25rem",background:mobileTab===t.id?"rgba(232,114,138,0.15)":"transparent",color:mobileTab===t.id?"#f090b0":"#4a3a5a",border:"none",borderBottom:mobileTab===t.id?"2px solid #e8728a":"2px solid transparent",cursor:"pointer",fontFamily:"inherit",fontSize:"0.7rem"}}>
            <div style={{fontSize:"0.9rem",marginBottom:"1px"}}>{t.icon}</div>
            {t.label}
          </button>
        ))}
      </div>
      {/* タブコンテンツ */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
        {mobileTab==="story"&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minHeight:0}}>
            {storyAreaEl}
            {inputAreaEl}
          </div>
        )}
        {mobileTab==="status"&&(
          <div style={{flex:1,overflowY:"auto",padding:"12px",background:"#09060f"}}>
            {gs&&statusPanelEl}
          </div>
        )}
        {mobileTab==="log"&&(
          <div style={{flex:1,overflowY:"auto",padding:"10px",background:"#09060f"}}>
            {logPanelEl}
          </div>
        )}
      </div>
    </div>
  );
}
// ── GLOBAL SETTINGS（App外で定義・再生成なし）──────────
function GlobalSettingsBtn({show,onClick}){

// ── SLIDER COMPONENTS（Game外で定義・再生成なし）────────
// onInputでDOMを直接更新してReact再レンダリングを待たない
function SliderTrack({id,min,max,step,initVal,color,height,onChange}){
  const inputRef=useRef(null);
  const setGrad=(v)=>{
    if(inputRef.current){
      const pct=(v-min)/(max-min)*100;
      inputRef.current.style.background=
        `linear-gradient(to right,${color} 0%,${color} ${pct}%,#1a0a1a ${pct}%,#1a0a1a 100%)`;
    }
  };
  useEffect(()=>{setGrad(initVal);},[initVal]);
  return(
    <input ref={inputRef} type="range" min={min} max={max} step={step||1}
      defaultValue={initVal}
      onInput={e=>{const v=Number(e.target.value);setGrad(v);onChange(v);}}
      style={{flex:1,height:height||"5px",cursor:"pointer",
        accentColor:color,borderRadius:"3px",outline:"none",border:"none"}}
    />
  );
}

  <script>
  (function(){
    function showBootError(msg){
      var root=document.getElementById("root");
      if(!root)return;
      root.innerHTML=
        '<div style="max-width:520px;margin:32px auto;padding:22px;color:#d4c4a8;font-family:Yu Mincho,Georgia,serif;line-height:1.85">'+
        '<h2 style="color:#e8728a;font-size:18px;font-weight:normal;margin-bottom:14px">起動できません</h2>'+
        '<p style="margin-bottom:12px">'+msg+'</p>'+
        '<p style="font-size:12px;color:#7a6a5a">・インターネット接続を確認し、<b>Ctrl+F5</b> で再読み込み<br>'+
        '・<code style="color:#c8a060">file://</code> で開いている場合は、フォルダを右クリック → Live Server 等で <code style="color:#c8a060">http://</code> から開いてください</p></div>';
    }
    function boot(){
      if(window.__gensokyo_cdn){
        return showBootError("CDNの読み込みに失敗しました（"+window.__gensokyo_cdn+"）。ファイアウォールや広告ブロックを確認してください。");
      }
      if(!window.React||!window.ReactDOM){
        return showBootError("React が読み込めません。ネットワークまたは CDN ブロックを確認してください。");
      }
      if(!window.Babel||!Babel.transform){
        return showBootError("Babel が読み込めません。ページを再読み込みしてください。");
      }
      var srcEl=document.getElementById("gensokyo-source");
      if(!srcEl)return showBootError("アプリ本体（gensokyo-source）が見つかりません。");
      var loadingEl=document.getElementById("gensokyo-loading");
      setTimeout(function(){
        if(loadingEl&&loadingEl.parentNode) loadingEl.textContent="読み込み中…（初回は変換に20〜40秒ほどかかることがあります）";
      },2500);
      try{
        var code=Babel.transform(srcEl.textContent,{presets:["react"]}).code;
        var s=document.createElement("script");
        s.textContent=code;
        document.body.appendChild(s);
        var loading=document.getElementById("gensokyo-loading");
        if(loading&&!document.querySelector("#root [data-gensokyo-mounted]")){
          setTimeout(function(){
            if(document.getElementById("gensokyo-loading")){
              showBootError("スクリプト実行後も画面が更新されません。F12 → Console のエラーを確認してください。");
            }
          },3000);
        }
      }catch(e){
        console.error(e);
        showBootError("JSX変換エラー: "+(e.message||e));
      }
    }
    if(document.readyState==="complete") boot();
    else window.addEventListener("load", boot);
  })();
  </script>
